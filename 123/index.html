<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Barfinder 依照今晚想喝的酒與氛圍，快速找到附近適合的酒吧。"
    />
    <meta property="og:title" content="Barfinder" />
    <meta
      property="og:description"
      content="用一句話描述今晚想喝的，獲得附近酒吧推薦。"
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#123a2e" />
    <title>Barfinder</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="preload" as="image" href="./assets/angel-mural-vertical.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="./assets/barfinder-rye-bottle.webp" fetchpriority="high" />
    <link rel="stylesheet" href="./styles.css?v=20260709-loadercity" />
  </head>
  <body>
    <main class="app-shell">
      <div class="intro-scroll">
        <section class="landing-hero" aria-label="Barfinder 首頁">
          <div class="hero-emboss" aria-hidden="true">Barfinder</div>
          <div class="bottle-stage" aria-hidden="true">
            <div class="bottle-halo"></div>
            <img
              class="hero-bottle"
              src="./assets/barfinder-rye-bottle.webp"
              width="905"
              height="1360"
              decoding="async"
              fetchpriority="high"
              alt=""
            />
          </div>
        </section>

        <section class="chat-stage" id="agentDialog" aria-label="Agent 對話框">
          <div class="chat-panel">
            <h2>Where to drink tonight?</h2>
            <label class="landing-city-control">
              <span>City</span>
              <select id="landingCitySelect"></select>
            </label>
            <textarea
              id="landingIntentInput"
              spellcheck="false"
              placeholder="Tell me what kind of night you want..."
            ></textarea>
          </div>
        </section>
      </div>

      <section class="agent-stage finder-stage" id="finderInterface" aria-label="Agent 篩選介面">
        <div class="workspace">
          <header class="dialog-header">
            <div>
              <h2>按類別微調，讓 Agent 幫你篩選</h2>
            </div>
          </header>

          <div class="layout dialog-shell">
            <section class="input-panel" aria-label="推薦入口">
              <div class="field-grid">
                <label>
                  <span>城市</span>
                  <select id="citySelect"></select>
                </label>
                <label>
                  <span>目前區域</span>
                  <select id="areaSelect"></select>
                </label>
                <label>
                  <span>搜尋半徑</span>
                  <select id="radiusSelect">
                    <option value="0.5">0.5 km</option>
                    <option value="1">1 km</option>
                    <option value="1.5">1.5 km</option>
                    <option value="2">2 km</option>
                    <option value="2.5">2.5 km</option>
                    <option value="3" selected>3 km</option>
                    <option value="4">4 km</option>
                    <option value="5">5 km</option>
                    <option value="7.5">7.5 km</option>
                    <option value="10">10 km</option>
                  </select>
                </label>
              </div>

              <label class="textarea-label">
                <span>直接問我</span>
                <textarea
                  id="intentInput"
                  spellcheck="false"
                  placeholder="例如：舒服一點、安靜聊天；或者：週五想熱鬧，有 DJ 可以跳舞"
                ></textarea>
              </label>

              <div class="toolbar">
                <button id="recommendBtn" class="primary-btn" type="button">
                  <span class="icon">◆</span>
                  問 Agent
                </button>
              </div>

            </section>

            <section class="results-panel" aria-label="推薦結果">
              <div class="summary-band">
                <p class="section-label">agent reply</p>
                <h2 id="summaryText">你說需求，我來答</h2>
                <div class="agent-answer" id="agentAnswer">
                  <p>我會先理解你想要的酒、氛圍和位置，再給你一個最像朋友推薦的答案。</p>
                </div>
              </div>

              <div class="metrics-row">
                <div>
                  <span class="metric-value" id="resultCount">0</span>
                  <span class="metric-label">bars</span>
                </div>
                <div>
                  <span class="metric-value" id="intentCount">0</span>
                  <span class="metric-label">intents</span>
                </div>
                <div>
                  <span class="metric-value" id="bestDistance">0.0</span>
                  <span class="metric-label">nearest km</span>
                </div>
              </div>

              <div class="recommendation-list" id="recommendationList"></div>

              <details class="json-panel" hidden>
                <summary class="json-header">
                  <span class="section-label">JSON output</span>
                  <button id="copyBtn" type="button" title="複製 JSON">
                    <span class="icon">⧉</span>
                  </button>
                </summary>
                <div>
                  <pre id="jsonOutput">{}</pre>
                </div>
              </details>
            </section>
          </div>
        </div>
        <div class="loading-overlay" id="loadingOverlay" aria-live="polite" aria-hidden="true">
          <div class="pour-loader">
            <div class="pour-stream" aria-hidden="true"></div>
            <div class="loader-bottle-wrap" aria-hidden="true">
              <div class="loader-bottle-fill"></div>
              <img
                class="loader-bottle"
                src="./assets/barfinder-rye-bottle.webp"
                width="905"
                height="1360"
                decoding="async"
                alt=""
              />
            </div>
            <p>Pouring your night...</p>
          </div>
        </div>
      </section>
    </main>
    <script src="./data.js?v=20260709-areas"></script>
    <script src="./app.js?v=20260709-loadercity"></script>
  </body>
</html>
